<!DOCTYPE html>
<html lang="tr-TR">
<head>
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://*.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com; connect-src 'self' https://*.google-analytics.com https://*.googletagmanager.com https://*.analytics.google.com; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/lang.js"></script>
  <meta name="robots" content="noindex, nofollow">
  <title>Sayfa Bulunamadı | Enes Yıldız</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="msapplication-TileColor" content="#0f0f0f">
  <meta name="msapplication-TileImage" content="/mstile-150x150.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/fonts/inter.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f5;
      --white: #ffffff;
      --gray-400: #999;
      --gray-500: #777;
      --gray-600: #555;
      --gray-900: #1a1a1a;
      --accent: #2f89a8;
      --mono: 'SF Mono', 'Fira Code', monospace;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --white: #141414;
      --gray-400: #666;
      --gray-500: #888;
      --gray-600: #aaa;
      --gray-900: #f0f0f0;
      --accent: #74B7D2;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .error-code {
      font-family: var(--mono);
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--gray-400);
      opacity: 0.35;
      line-height: 1;
      margin-bottom: 16px;
    }

    .error-title {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--gray-900);
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 15px;
      color: var(--gray-500);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      padding: 12px 28px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      transition: background 0.25s, color 0.25s;
    }

    .back-link:hover {
      background: var(--accent);
      color: #fff;
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
  </style>
  <link rel="stylesheet" href="/css/nav.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YK3V82N7CD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YK3V82N7CD');
  </script>
</head>
<body>
  <div id="nav-placeholder"></div>
  <script src="/js/nav.js"></script>
  <div class="error-code">404</div>
  <h1 class="error-title">Sayfa bulunamadı</h1>
  <p class="error-desc">Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.</p>
  <a href="/" class="back-link" id="homeLink">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span id="homeLinkText">Ana Sayfa</span>
  </a>
  <script>
    // /en/ altındaki kırık bağlantılarda 404 metnini İngilizce göster
    (function () {
      var path = window.location.pathname;
      if (path !== '/en' && path.indexOf('/en/') !== 0) return;
      document.documentElement.lang = 'en-US';
      document.title = 'Page Not Found | Enes Yıldız';
      document.querySelector('.error-title').textContent = 'Page not found';
      document.querySelector('.error-desc').textContent = 'The page you are looking for may have been moved, deleted, or may never have existed.';
      var homeLink = document.getElementById('homeLink');
      homeLink.setAttribute('href', '/en/');
      document.getElementById('homeLinkText').textContent = 'Home';
    })();
  </script>
</body>
</html>
